<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Apple Caliber Scan{% endblock %} — Freshora</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  .navbar-freshora { background-color: #1a5c2e; }
  .navbar-freshora .navbar-brand, .navbar-freshora .nav-link { color: #fff !important; }
  .navbar-freshora .nav-link:hover { color: #c8e6c9 !important; }
  .badge-75plus { background-color: #1a5c2e; }
  .section-header { border-bottom: 2px solid #1a5c2e; color: #1a5c2e; margin-bottom: 1rem; padding-bottom: 0.25rem; }
  .status-pending { color: #f0b429; }
  .status-scanned, .status-annotated { color: #1a5c2e; }
  .status-reported { color: #2c5f8a; }
  body { background: #f9f9f9; }
  .card { border: 1px solid #ddd; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-freshora mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Freshora Sp. Z. o. o.</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon" style="filter:invert(1)"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Partie</a></li>
        <li class="nav-item"><a class="nav-link" href="/batches/new">Nowa partia</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Wyloguj</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  {% if flash_message %}
  <div class="alert alert-{{ flash_type or 'info' }} alert-dismissible fade show">
    {{ flash_message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

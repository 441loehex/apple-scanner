<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logowanie — Freshora</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  body { background: #f0f5f0; }
  .login-card { max-width: 400px; margin: 100px auto; }
  .login-header { background: #1a5c2e; color: #fff; padding: 20px; border-radius: 4px 4px 0 0; text-align: center; }
</style>
</head>
<body>
<div class="login-card card shadow">
  <div class="login-header">
    <h4 class="mb-0">Freshora Sp. Z. o. o.</h4>
    <small>Apple Caliber Scan</small>
  </div>
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-bold">Login</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Hasło</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn w-100" style="background:#1a5c2e;color:#fff;">Zaloguj się</button>
    </form>
  </div>
</div>
</body>
</html>
